openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ShareNova API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shares
    description: Share operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /share/code:
    post:
      operationId: createCodeShare
      tags: [shares]
      summary: Create a code share
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCodeShareBody"
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"

  /share/files:
    post:
      operationId: createFileShare
      tags: [shares]
      summary: Create a file share (multipart)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                expiresIn:
                  type: string
                  enum: [1h, 24h, permanent]
                  default: permanent
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"

  /share/recent:
    get:
      operationId: getRecentShares
      tags: [shares]
      summary: Get recent shares (last 20)
      responses:
        "200":
          description: List of recent shares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShareSummary"

  /share/stats:
    get:
      operationId: getShareStats
      tags: [shares]
      summary: Get platform statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareStats"

  /share/{id}:
    get:
      operationId: getShare
      tags: [shares]
      summary: Get a share by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Share"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteShare
      tags: [shares]
      summary: Delete a share
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreateCodeShareBody:
      type: object
      properties:
        content:
          type: string
          description: The code content
        language:
          type: string
          description: Programming language
          default: plaintext
        expiresIn:
          type: string
          enum: [1h, 24h, permanent]
          default: permanent
        title:
          type: string
          description: Optional title for the snippet
      required:
        - content

    FileInfo:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        mimeType:
          type: string
        url:
          type: string
          description: Download URL path
      required:
        - name
        - size
        - mimeType
        - url

    Share:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [code, file]
        content:
          type: string
          nullable: true
          description: Code content (for code shares)
        language:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileInfo"
          nullable: true
        viewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - type
        - viewCount
        - createdAt

    ShareSummary:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [code, file]
        language:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        viewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        fileCount:
          type: integer
          nullable: true
      required:
        - id
        - type
        - viewCount
        - createdAt

    ShareStats:
      type: object
      properties:
        totalShares:
          type: integer
        codeShares:
          type: integer
        fileShares:
          type: integer
        totalViews:
          type: integer
        topLanguages:
          type: array
          items:
            type: object
            properties:
              language:
                type: string
              count:
                type: integer
            required:
              - language
              - count
      required:
        - totalShares
        - codeShares
        - fileShares
        - totalViews
        - topLanguages

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
